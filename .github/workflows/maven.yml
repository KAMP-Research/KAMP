name: Build and Deploy Updatesite

on:
  push:
    branches: [ "setup-github-actions-build" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
      
    - name: Build update site
      run: mvn -B -U clean verify

    - name: Verify ZIP exists
      run: |
        test -f releng/edu.kit.ipd.sdq.kamp.updatesite/target/edu.kit.ipd.sdq.kamp.updatesite-0.1.0-SNAPSHOT.zip

    - name: Prepare Pages content
      run: |
        rm -rf pages-site
        mkdir -p pages-site
        unzip -q releng/edu.kit.ipd.sdq.kamp.updatesite/target/edu.kit.ipd.sdq.kamp.updatesite-0.1.0-SNAPSHOT.zip -d pages-site
        touch pages-site/.nojekyll

        cat > pages-site/index.html <<'EOF'
        <!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8">
          <title>KAMP Eclipse Update Site</title>
        </head>
        <body>
          <h1>KAMP Eclipse Update Site</h1>
          <ul>
            <li><a href="content.jar">content.jar</a></li>
            <li><a href="content.xml">content.xml</a></li>
            <li><a href="artifacts.jar">artifacts.jar</a></li>
            <li><a href="artifacts.xml">artifacts.xml</a></li>
            <li><a href="features/">features/</a></li>
            <li><a href="plugins/">plugins/</a></li>
          </ul>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
